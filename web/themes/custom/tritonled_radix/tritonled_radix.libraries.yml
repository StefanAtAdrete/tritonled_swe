# Global styling - loaded on all pages
global-styling:
  version: VERSION
  css:
    theme:
      css/style.css: {}
      css/hero.css: {}
      css/components/media.css: {}
      css/components/cards.css: {}
      css/components/product-gallery.css: {}
      https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css: { type: external, minified: true }
      https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css: { type: external, minified: true }
  js:
    https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js: { type: external, minified: true, attributes: { defer: true } }

# Global scripts - loaded on all pages  
global-scripts:
  version: VERSION
  js:
    js/global.js: {}
  dependencies:
    - core/drupal
    - core/once
    - tritonled_radix/global-styling

# Hero carousel (migrate from old theme)
hero-carousel:
  version: VERSION
  css:
    component:
      css/hero.css: {}
  js:
    js/hero-carousel.js: {}
  dependencies:
    - core/drupal
    - radix/bootstrap5

# Product AJAX - re-initierar Blazy/Splide efter Commerce variation AJAX
product-ajax:
  version: VERSION
  js:
    js/product-ajax.js: {}
  dependencies:
    - core/drupal
    - core/once
    - core/drupal.ajax

# Variation media observer - MutationObserver för Commerce's eget AJAX-system
# Commerce använder inte Drupal's ajaxComplete - därför krävs MutationObserver
# Se: /docs/03-solutions/product-ajax-library-attach.md
product-variation-media:
  version: VERSION
  js:
    js/product-variation-media.js: {}
  dependencies:
    - core/drupal
    - core/once

# Component-specific CSS (loaded via preprocess when needed)
component-media:
  version: VERSION
  css:
    component:
      css/components/media.css: {}

component-product-gallery:
  version: VERSION
  css:
    component:
      css/components/product-gallery.css: {}

# Bootstrap tabs replacement for lb_tabs
lb-tabs-bootstrap:
  version: VERSION
  css:
    component:
      css/components/lb-tabs.css: {}
  js:
    js/lb-tabs-bootstrap.js: {}
  dependencies:
    - core/drupal
    - core/jquery
    - core/once
    - tritonled_radix/global-styling
