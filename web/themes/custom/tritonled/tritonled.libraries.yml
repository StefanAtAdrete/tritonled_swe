global-styling:
  version: VERSION
  css:
    theme:
      https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css: { external: true, minified: true }
      css/style.css: {}
      css/menu.css: {}
      css/tables.css: {}
      css/product.css: {}
      css/product-luminaire.css: {}
      css/components/media.css: {}
      css/components/product-gallery.css: {}
  js:
    https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js: { external: true, minified: true }

hero:
  version: VERSION
  css:
    theme:
      css/hero.css: {}
  js:
    js/hero-carousel.js: {}
  dependencies:
    - core/jquery

product:
  version: 1.2
  css:
    theme:
      css/product.css: {}
      css/components/product-gallery.css: {}

product-ajax:
  version: 1.x
  js:
    js/product-ajax.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/jquery.once

bootstrap-icons:
  version: 1.11.3
  css:
    theme:
      https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css: { type: external, minified: true }

print:
  version: VERSION
  css:
    theme:
      css/print.css: { media: print }

slick-commerce-ajax:
  version: VERSION
  js:
    js/slick-commerce-ajax.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupal.ajax
